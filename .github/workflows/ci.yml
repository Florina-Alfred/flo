name: CI

# Minimal pipeline: runs on pushes to `main` and on every pull request.
# Feature branches run CI once via the PR event (scoping `push` to `main`
# only avoids duplicate runs when a branch is both pushed and PR'd).
# This is the required status-check gate for merging into main.
# The heavy security scanning (audit/deny/trivy/codeql/release) lives in
# .github/workflows/security.yml and runs ONLY on main (push + tags).

on:
  push:
    branches: [main]
  pull_request:
    branches: ["**"]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # Detect whether the change affects Rust (code/Cargo.toml/workflows) or is
  # docs-only. Implemented with plain git diff (no third-party action) so the
  # supply-chain surface stays minimal.
  changes:
    name: changes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      rust: ${{ steps.scope.outputs.rust }}
      docs: ${{ steps.scope.outputs.docs }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - id: scope
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "rust=true" >> "$GITHUB_OUTPUT"
            echo "docs=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Compare the PR head against the base branch.
          git fetch origin "${{ github.base_ref }}" --depth=1
          BASE="origin/${{ github.base_ref }}"
          FILES=$(git diff --name-only "$BASE"..HEAD)
          echo "Changed files:"
          echo "$FILES"
          if echo "$FILES" | grep -Eq '\.(rs)$|^(Cargo\.toml|Cargo\.lock)$|\.github/workflows/'; then
            echo "rust=true" >> "$GITHUB_OUTPUT"
          else
            echo "rust=false" >> "$GITHUB_OUTPUT"
          fi
          if echo "$FILES" | grep -Eq '\.md$|^docs/'; then
            echo "docs=true" >> "$GITHUB_OUTPUT"
          else
            echo "docs=false" >> "$GITHUB_OUTPUT"
          fi
        shell: bash


  fmt:
    name: fmt
    needs: [changes]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - if: needs.changes.outputs.rust == 'true'
        uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # stable
        with:
          toolchain: "1.97.1"
          components: rustfmt
      - if: needs.changes.outputs.rust == 'true'
        name: Check formatting
        run: cargo fmt --all -- --check

  clippy:
    name: clippy
    needs: [changes]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - if: needs.changes.outputs.rust == 'true'
        uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # stable
        with:
          toolchain: "1.97.1"
          components: clippy
      - if: needs.changes.outputs.rust == 'true'
        uses: Swatinem/rust-cache@aa7c1c80a07a27a84c0aa76d0cef0aad3830e330 # v2.7.8
      - if: needs.changes.outputs.rust == 'true'
        name: Clippy (deny warnings)
        run: cargo clippy --all-targets -- -D warnings

  test:
    name: test (${{ matrix.rust }})
    needs: [changes]
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        rust: [stable, beta, "1.97.1"]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - if: needs.changes.outputs.rust == 'true'
        uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # stable
        with:
          toolchain: ${{ matrix.rust }}
      - if: needs.changes.outputs.rust == 'true'
        uses: Swatinem/rust-cache@aa7c1c80a07a27a84c0aa76d0cef0aad3830e330 # v2.7.8
      - if: needs.changes.outputs.rust == 'true'
        name: Cargo check
        run: cargo check --all-targets
      - if: needs.changes.outputs.rust == 'true'
        name: Cargo test
        run: cargo test --bin flo

  # The `media` feature needs system GStreamer, so it is excluded from the
  # default (free-tier, no-system-deps) pipeline above. This job installs the
  # GStreamer dev packages and verifies the media build, example, and clippy.
  media:
    name: media
    needs: [changes]
    if: needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # stable
        with:
          toolchain: "1.97.1"
          components: clippy
      - uses: Swatinem/rust-cache@aa7c1c80a07a27a84c0aa76d0cef0aad3830e330 # v2.7.8
      - name: Install GStreamer dev packages
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgstreamer1.0-dev \
            libgstreamer-plugins-base1.0-dev \
            libx264-dev \
            gstreamer1.0-plugins-base \
            gstreamer1.0-plugins-good \
            gstreamer1.0-plugins-bad \
            gstreamer1.0-plugins-ugly
      - name: Clippy (media, deny warnings)
        run: cargo clippy --features media --all-targets -- -D warnings
      - name: Build (media)
        run: cargo build --features media
      - name: Build example (media)
        run: cargo build --features media --example video_peer
      - name: Test (media)
        run: cargo test --features media --bin flo
