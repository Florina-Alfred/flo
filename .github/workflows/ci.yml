name: CI

on:
  push:
    branches: ["**"]
    tags: ["v*"]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: dtolnay/rust-toolchain@a174a5839924ad3c9b41242562a18a0c4e6b233b # stable
        with:
          components: rustfmt
      - name: Check formatting
        run: cargo fmt --all -- --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: dtolnay/rust-toolchain@a174a5839924ad3c9b41242562a18a0c4e6b233b # stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@9d47c6ad4b22b50cec8db428fc8533546f5faeea # v2.7.8
      - name: Clippy (deny warnings)
        run: cargo clippy --all-targets -- -D warnings

  test:
    name: test (${{ matrix.rust }})
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        rust: [stable, beta, "1.97.1"]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: dtolnay/rust-toolchain@a174a5839924ad3c9b41242562a18a0c4e6b233b # master
        with:
          toolchain: ${{ matrix.rust }}
      - uses: Swatinem/rust-cache@9d47c6ad4b22b50cec8db428fc8533546f5faeea # v2.7.8
      - name: Cargo check
        run: cargo check --all-targets
      - name: Cargo test
        run: cargo test --bin flo

  release:
    name: release artifact
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: dtolnay/rust-toolchain@a174a5839924ad3c9b41242562a18a0c4e6b233b # stable
      - uses: Swatinem/rust-cache@9d47c6ad4b22b50cec8db428fc8533546f5faeea # v2.7.8
      - name: Build release binary
        run: cargo build --release --bin flo
      - name: Upload binary artifact
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: flo-${{ github.ref_name }}-linux-x86_64
          path: target/release/flo
          retention-days: 30
