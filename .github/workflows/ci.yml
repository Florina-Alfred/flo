name: CI

on:
  push:
    branches: ["**"]
    tags: ["v*"]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: dtolnay/rust-toolchain@a174a5839924ad3c9b41242562a18a0c4e6b233b # stable
        with:
          components: rustfmt
      - name: Check formatting
        run: cargo fmt --all -- --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: dtolnay/rust-toolchain@a174a5839924ad3c9b41242562a18a0c4e6b233b # stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@9d47c6ad4b22b50cec8db428fc8533546f5faeea # v2.7.8
      - name: Clippy (deny warnings)
        run: cargo clippy --all-targets -- -D warnings

  test:
    name: test (${{ matrix.rust }})
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        rust: [stable, beta, "1.97.1"]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: dtolnay/rust-toolchain@a174a5839924ad3c9b41242562a18a0c4e6b233b # master
        with:
          toolchain: ${{ matrix.rust }}
      - uses: Swatinem/rust-cache@9d47c6ad4b22b50cec8db428fc8533546f5faeea # v2.7.8
      - name: Cargo check
        run: cargo check --all-targets
      - name: Cargo test
        run: cargo test --bin flo

  release:
    name: release artifact
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: dtolnay/rust-toolchain@a174a5839924ad3c9b41242562a18a0c4e6b233b # stable
      - uses: Swatinem/rust-cache@9d47c6ad4b22b50cec8db428fc8533546f5faeea # v2.7.8
      - name: Build release binary
        run: cargo build --release --bin flo
      - name: Upload binary artifact
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: flo-${{ github.ref_name }}-linux-x86_64
          path: target/release/flo
          retention-days: 30

  audit:
    name: cargo-audit
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: dtolnay/rust-toolchain@a174a5839924ad3c9b41242562a18a0c4e6b233b # stable
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: Run audit
        run: cargo audit --json > audit.json || true
      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: cargo-audit
          path: audit.json
          retention-days: 30

  deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: dtolnay/rust-toolchain@a174a5839924ad3c9b41242562a18a0c4e6b233b # stable
      - name: Install cargo-deny
        run: cargo install cargo-deny --locked
      - name: Run deny
        run: cargo deny check licenses bans

  trivy:
    name: trivy fs scan
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      security-events: write
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@6c175e9c4083a92bbca2f7c1a5b9e28c5b9817a1 # v0.28.0
        with:
          scan-type: fs
          scanners: vuln,secret,config
          format: sarif
          output: trivy.sarif
          severity: CRITICAL,HIGH
      - name: Upload Trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy.sarif
          category: trivy

  codeql:
    name: codeql
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      security-events: write
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: rust
      - name: Autobuild
        uses: github/codeql-action/autobuild@v3
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: codeql
