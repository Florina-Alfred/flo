name: CI

# Minimal pipeline: runs on pushes to `main` and on every pull request.
# Feature branches run CI once via the PR event (scoping `push` to `main`
# only avoids duplicate runs when a branch is both pushed and PR'd).
# This is the required status-check gate for merging into main.
# The heavy security scanning (audit/deny/trivy/codeql/release) lives in
# .github/workflows/security.yml and runs ONLY on main (push + tags).

on:
  push:
    branches: [main]
  pull_request:
    branches: ["**"]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # Detect whether the change affects Rust (code/Cargo.toml/workflows) or is
  # docs-only. Docs-only PRs skip the Rust gate entirely (the required checks
  # report "skipped", which satisfies branch protection) so doc changes don't
  # burn CI minutes or block on a full build.
  changes:
    name: changes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      rust: ${{ steps.conclude.outputs.rust }}
      docs: ${{ steps.conclude.outputs.docs }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - id: filter
        uses: dorny/paths-filter@de90cc6fb38fc096da4c647c81dfe7308752e5e8 # v3.0.2
        with:
          predicate-quantifier: "every"
          filters: |
            rust:
              - "**/*.rs"
              - "Cargo.toml"
              - "Cargo.lock"
              - ".github/workflows/**"
            docs:
              - "**/*.md"
              - "docs/**"
      # Pushes to main (already-reviewed merges) always run the full gate.
      # Otherwise defer to the path filter.
      - id: conclude
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "rust=true" >> "$GITHUB_OUTPUT"
            echo "docs=false" >> "$GITHUB_OUTPUT"
          else
            echo "rust=${{ steps.filter.outputs.rust }}" >> "$GITHUB_OUTPUT"
            echo "docs=${{ steps.filter.outputs.docs }}" >> "$GITHUB_OUTPUT"
          fi
        shell: bash

  fmt:
    name: fmt
    needs: [changes]
    if: needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # stable
        with:
          toolchain: "1.97.1"
          components: rustfmt
      - name: Check formatting
        run: cargo fmt --all -- --check

  clippy:
    name: clippy
    needs: [changes]
    if: needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # stable
        with:
          toolchain: "1.97.1"
          components: clippy
      - uses: Swatinem/rust-cache@aa7c1c80a07a27a84c0aa76d0cef0aad3830e330 # v2.7.8
      - name: Clippy (deny warnings)
        run: cargo clippy --all-targets -- -D warnings

  test:
    name: test (${{ matrix.rust }})
    needs: [changes]
    if: needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        rust: [stable, beta, "1.97.1"]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # stable
        with:
          toolchain: ${{ matrix.rust }}
      - uses: Swatinem/rust-cache@aa7c1c80a07a27a84c0aa76d0cef0aad3830e330 # v2.7.8
      - name: Cargo check
        run: cargo check --all-targets
      - name: Cargo test
        run: cargo test --bin flo

  # The `media` feature needs system GStreamer, so it is excluded from the
  # default (free-tier, no-system-deps) pipeline above. This job installs the
  # GStreamer dev packages and verifies the media build, example, and clippy.
  media:
    name: media
    needs: [changes]
    if: needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # stable
        with:
          toolchain: "1.97.1"
          components: clippy
      - uses: Swatinem/rust-cache@aa7c1c80a07a27a84c0aa76d0cef0aad3830e330 # v2.7.8
      - name: Install GStreamer dev packages
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgstreamer1.0-dev \
            libgstreamer-plugins-base1.0-dev \
            libx264-dev \
            gstreamer1.0-plugins-base \
            gstreamer1.0-plugins-good \
            gstreamer1.0-plugins-bad \
            gstreamer1.0-plugins-ugly
      - name: Clippy (media, deny warnings)
        run: cargo clippy --features media --all-targets -- -D warnings
      - name: Build (media)
        run: cargo build --features media
      - name: Build example (media)
        run: cargo build --features media --example video_peer
      - name: Test (media)
        run: cargo test --features media --bin flo
