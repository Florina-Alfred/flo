name: Security & Release

# Full security pipeline + release artifact.
# Runs ONLY on main (push) and on version tags.
# Branch/PR validation is handled by .github/workflows/ci.yml (the required
# status-check gate). Keeping the security scan on main limits the blast
# radius of any third-party action and conserves free-tier minutes.

on:
  push:
    branches: [main]
    tags: ["v*"]

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  audit:
    name: cargo-audit
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # stable
        with:
          toolchain: "1.97.1"
      - uses: Swatinem/rust-cache@aa7c1c80a07a27a84c0aa76d0cef0aad3830e330 # v2.7.8
        # Caches ~/.cargo (incl. installed binaries) so the repeated
        # `cargo install` of the security tooling is a no-op on cache hit
        # instead of rebuilding the same crate graph every run.
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: Run audit
        # Hard gate: fails the job on any RUSTSEC advisory not explicitly
        # allowlisted. Allowlisted advisories are reviewed and recorded in
        # audit.toml ([advisories].ignore) with a justification. This cargo-audit
        # version does not read audit.toml in --json mode, so the workflow passes
        # those IDs via --ignore (derived from audit.toml to avoid drift).
        # New/unlisted advisories still fail the build.
        run: |
          IGNORE_FLAGS=$(grep -oE 'RUSTSEC-[0-9-]+' audit.toml | sort -u | sed 's/^/--ignore /' | tr '\n' ' ')
          cargo audit --json ${IGNORE_FLAGS} > audit.json
      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: cargo-audit
          path: audit.json
          retention-days: 30

  deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # stable
        with:
          toolchain: "1.97.1"
      - uses: Swatinem/rust-cache@aa7c1c80a07a27a84c0aa76d0cef0aad3830e330 # v2.7.8
      - name: Install cargo-deny
        run: cargo install cargo-deny --locked
      - name: Run deny
        run: cargo deny check licenses bans

  sbom:
    name: CycloneDX SBOM
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # stable
        with:
          toolchain: "1.97.1"
      - uses: Swatinem/rust-cache@aa7c1c80a07a27a84c0aa76d0cef0aad3830e330 # v2.7.8
      - name: Install cargo-cyclonedx
        run: cargo install cargo-cyclonedx@0.5.9 --locked
      - name: Generate SBOM
        run: cargo cyclonedx -f json --override-filename sbom.cdx
      - name: Upload SBOM
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: flo-sbom
          path: sbom.cdx.json
          retention-days: 30

  trivy:
    name: trivy fs scan
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      security-events: write
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Trivy filesystem scan
        # v0.35.0 — known-good release after the 2026-03 supply-chain
        # compromise. SHA verified against the signed GitHub release.
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          scan-type: fs
          scanners: vuln,secret,config
          format: sarif
          output: trivy.sarif
      - name: Upload Trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy.sarif
          category: trivy

  codeql:
    name: codeql
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      security-events: write
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: Swatinem/rust-cache@aa7c1c80a07a27a84c0aa76d0cef0aad3830e330 # v2.7.8
        # Speeds up CodeQL autobuild by reusing cached cargo registry/target.
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: rust
      - name: Autobuild
        uses: github/codeql-action/autobuild@v3
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: codeql

  build:
    # Build the release binary once and publish it as an artifact so the
    # `release` job (and anything else) can consume it without recompiling.
    # Runs in parallel with the audit/deny/sbom/trivy/codeql scans instead of
    # being serialized behind them. Only built on tags, where a consumer exists.
    name: build release binary
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # stable
        with:
          toolchain: "1.97.1"
      - uses: Swatinem/rust-cache@aa7c1c80a07a27a84c0aa76d0cef0aad3830e330 # v2.7.8
      - name: Build release binary
        run: cargo build --release --bin flo
      - name: Upload binary artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: flo-binary
          path: target/release/flo
          retention-days: 30

  release:
    name: release artifact
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Download prebuilt binary
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: flo-binary
          path: dist
      - name: Ensure binary is executable
        run: chmod +x dist/flo
      - name: Publish versioned binary artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: flo-${{ github.ref_name }}-linux-x86_64
          path: dist/flo
          retention-days: 30
