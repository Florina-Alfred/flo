name: Security & Release

# Full security pipeline + release artifact.
# Runs ONLY on main (push) and on version tags.
# Branch/PR validation is handled by .github/workflows/ci.yml (the required
# status-check gate). Keeping the security scan on main limits the blast
# radius of any third-party action and conserves free-tier minutes.

on:
  push:
    branches: [main]
    tags: ["v*"]

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  audit:
    name: cargo-audit
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # stable
        with:
          toolchain: stable
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: Run audit
        # Hard gate: fails the job on any RUSTSEC advisory. To allowlist a
        # specific, reviewed advisory, add `cargo audit ignore RUSTSEC-XXXX`
        # (committed to the repo) with a justification comment.
        run: cargo audit --json > audit.json
      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: cargo-audit
          path: audit.json
          retention-days: 30

  deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # stable
        with:
          toolchain: stable
      - name: Install cargo-deny
        run: cargo install cargo-deny --locked
      - name: Run deny
        run: cargo deny check licenses bans

  trivy:
    name: trivy fs scan
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      security-events: write
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Trivy filesystem scan
        # v0.35.0 — known-good release after the 2026-03 supply-chain
        # compromise. SHA verified against the signed GitHub release.
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          scan-type: fs
          scanners: vuln,secret,config
          format: sarif
          output: trivy.sarif
      - name: Upload Trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy.sarif
          category: trivy

  codeql:
    name: codeql
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      security-events: write
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: rust
      - name: Autobuild
        uses: github/codeql-action/autobuild@v3
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: codeql

  release:
    name: release artifact
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # stable
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@aa7c1c80a07a27a84c0aa76d0cef0aad3830e330 # v2.7.8
      - name: Build release binary
        run: cargo build --release --bin flo
      - name: Upload binary artifact
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: flo-${{ github.ref_name }}-linux-x86_64
          path: target/release/flo
          retention-days: 30
