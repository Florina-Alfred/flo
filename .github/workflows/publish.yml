name: Publish to crates.io

# Publishes `flo-rs` to crates.io when a version tag (v*) is pushed.
# The token is provided by the CARGO_REGISTRY_TOKEN encrypted secret
# (repo Settings -> Secrets and variables -> Actions). It is NEVER committed
# to the repo and GitHub masks it in logs.
#
# Best-practice notes:
# - Fires ONLY on a `v*` tag push, so it cannot fire on a branch push or PR.
# - A `v*` tag can only reach main via a merged PR, which branch protection
#   already requires to pass the CI gate (ci.yml) + independent review first.
# - A guard step aborts if the tagged commit is not on the main lineage, so a
#   tag pushed on a feature branch will not publish an unintended version.
# - `cargo publish` is idempotent: if the version already exists it errors.
# - Bump `version` in Cargo.toml, merge to main, then tag: `git tag vX.Y.Z &&
#   git push origin vX.Y.Z`.

on:
  push:
    tags: ["v*"]

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  publish:
    name: cargo publish
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Guard — publish only from the main lineage
        # `push: tags` fires on a v* tag pushed to ANY branch. Abort if the
        # tagged commit is not reachable from main, so releases only happen
        # from commits that went through a reviewed PR.
        run: |
          git fetch origin main
          if ! git merge-base --is-ancestor "$(git rev-parse HEAD)" "origin/main"; then
            echo "Tag commit is not on the main lineage; aborting publish."
            exit 1
          fi
      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # stable
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@aa7c1c80a07a27a84c0aa76d0cef0aad3830e330 # v2.7.8
      - name: Verify package
        run: cargo publish --dry-run
      - name: Publish to crates.io
        run: cargo publish --token "${CARGO_REGISTRY_TOKEN}"
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
